{% extends "base.html" %}
{% from "macros.html" import page_head %}
{% block title %}Настройки подключений{% endblock %}
{% block content %}
{{ page_head("Настройки подключений") }}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<div class="card content-stack">
  <form class="form" method="post" action="/onboarding/save" style="margin-top:0;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <div class="card card-nested stack">
      <h2 style="margin-top:0;">Redmine</h2>
      <div class="field">
        <label for="secret_REDMINE_URL">Адрес Redmine</label>
        <input id="secret_REDMINE_URL" name="secret_REDMINE_URL" type="text" placeholder="https://redmine.company.local"/>
      </div>
      <div class="field">
        <label for="secret_REDMINE_API_KEY">API-ключ Redmine</label>
        <input id="secret_REDMINE_API_KEY" name="secret_REDMINE_API_KEY" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"/>
      </div>
    </div>
    <div class="card card-nested stack">
      <h2 style="margin-top:0;">Matrix</h2>
      <div class="field">
        <label for="secret_MATRIX_HOMESERVER">Адрес Matrix</label>
        <input id="secret_MATRIX_HOMESERVER" name="secret_MATRIX_HOMESERVER" type="text" placeholder="https://matrix.company.local"/>
      </div>
      <div class="field">
        <label for="secret_MATRIX_USER_ID">Имя учётной записи</label>
        <input id="secret_MATRIX_USER_ID" name="secret_MATRIX_USER_ID" type="text" placeholder="@login:ваш.домен" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="secret_MATRIX_ACCESS_TOKEN">Токен</label>
        <input id="secret_MATRIX_ACCESS_TOKEN" name="secret_MATRIX_ACCESS_TOKEN" type="text" placeholder="syt_xxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
      </div>
    </div>
    <div class="page-actions page-actions--onboarding-submit">
      <button class="btn btn-primary btn--wide" type="submit">Сохранить и продолжить</button>
    </div>
  </form>
</div>
{% endblock %}
