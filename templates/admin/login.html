<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Вход — админка</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 100%; max-width: 22rem; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 500; }
    input { width: 100%; padding: 0.5rem; border: 1px solid #d4d4d8; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 1rem; width: 100%; padding: 0.6rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .error { color: #dc2626; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h1 style="margin-top:0;">Админка бота</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label for="token">Токен (ADMIN_TOKEN)</label>
    <input type="password" id="token" name="token" required autocomplete="current-password"/>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
