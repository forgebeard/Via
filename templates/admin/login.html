{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card" style="max-width: 28rem; margin: 0 auto; text-align:left;">
  <h1 style="margin-top:0;">Панель управления Matrix bot</h1>
  <p class="muted" style="margin-top:0.25rem;">Войдите по email и паролю для доступа к настройкам.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login" style="margin-top:1rem;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email"/>
    <label for="password">Пароль</label>
    <input type="password" id="password" name="password" required autocomplete="current-password"/>
    <p style="margin-top:1rem;">
      <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
    </p>
  </form>
  <p><a href="/forgot-password">Забыли пароль?</a></p>
</div>
{% endblock %}
