{% extends "base.html" %}
{% block title %}Секреты{% endblock %}
{% block content %}
<h1>Секреты приложения</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<div class="card" style="margin-bottom:1rem;">
  <form method="post" action="/secrets">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <label for="name">Имя секрета</label>
    <input id="name" name="name" required placeholder="REDMINE_API_KEY"/>
    <label for="value">Значение секрета</label>
    <input id="value" name="value" required />
    <p style="margin-top:1rem;"><button class="btn btn-primary" type="submit">Сохранить</button></p>
  </form>
</div>
<table>
  <thead><tr><th>Имя</th><th>Версия ключа</th><th>Обновлено</th></tr></thead>
  <tbody>
  {% for i in items %}
    <tr>
      <td>{{ i.name }}</td>
      <td>{{ i.key_version }}</td>
      <td>{{ i.updated_at }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
