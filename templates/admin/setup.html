{% extends "base.html" %}
{% block title %}Первичная настройка{% endblock %}
{% block content %}
<div class="card" style="max-width: 36rem; margin: 0 auto;">
  <h1 style="margin-top:0;">Первичная настройка</h1>
  <p class="muted">Создайте первого администратора.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/setup">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email"/>
    <label for="password">Пароль</label>
    <input type="password" id="password" name="password" required autocomplete="new-password"/>
    <p style="margin-top:1rem;"><button class="btn btn-primary" type="submit">Создать admin</button></p>
  </form>
</div>
{% endblock %}
