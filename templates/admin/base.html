<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Админка бота{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
    header { background: #27272a; color: #fafafa; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    header a { color: #a1a1aa; text-decoration: none; }
    header a:hover { color: #fafafa; }
    main { max-width: 56rem; margin: 1.5rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #e4e4e7; }
    th { background: #fafafa; font-weight: 600; }
    .btn { display: inline-block; padding: 0.4rem 0.75rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-ghost { background: #e4e4e7; color: #18181b; }
    input, textarea { width: 100%; max-width: 40rem; padding: 0.5rem; border: 1px solid #d4d4d8; border-radius: 6px; box-sizing: border-box; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    .card { background: #fff; padding: 1.25rem; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .muted { color: #71717a; font-size: 0.9rem; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
<header>
  <strong><a href="/" style="color:#fafafa;">Matrix bot</a></strong>
  <a href="/users">Пользователи</a>
  <a href="/routes/status">Статусы → комнаты</a>
  <a href="/routes/version">Версии → комнаты</a>
  <span style="margin-left:auto;"></span>
  <a href="/logout">Выход</a>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
