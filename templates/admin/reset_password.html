{% extends "base.html" %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<div class="card" style="max-width: 36rem; margin: 0 auto;">
  <h1 style="margin-top:0;">Установка нового пароля</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/reset-password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
    <label for="token">Токен</label>
    <input type="text" id="token" name="token" value="{{ token or '' }}" required/>
    <label for="password">Новый пароль</label>
    <input type="password" id="password" name="password" required autocomplete="new-password"/>
    <p style="margin-top:1rem;"><button class="btn btn-primary" type="submit">Сохранить пароль</button></p>
  </form>
</div>
{% endblock %}
