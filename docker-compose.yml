# =============================================================================
# Оркестрация: бот + PostgreSQL + постоянные тома.
#
# Зачем Postgres сейчас, если state в JSON:
#   - единая БД для будущей админки, пользователей, миграции state с файлов;
#   - переменная DATABASE_URL уже прокидывается в контейнер бота.
#
# Бот на текущем коде PostgreSQL не использует — сервис postgres поднимается
# заранее, чтобы не менять compose при появлении первого SQL-запроса.
#
# Запуск (из корня репозитория, после копирования и заполнения .env):
#   docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — данные на именованном томе (переживает пересоздание контейнера).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Значения по умолчанию можно переопределить в .env рядом с compose-файлом.
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-redmine_matrix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ждём готовности перед стартом бота (depends_on: condition).
      # $$ → один $ в shell контейнера (иначе compose подставит хостовые переменные).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Порт наружу не пробрасываем по умолчанию (БД только для сети compose).
    # Для отладки с хоста раскомментируйте:
    # ports:
    #   - "5432:5432"

  # ---------------------------------------------------------------------------
  # Бот: собирается из Dockerfile в этом репозитории.
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Строка подключения для будущего кода (asyncpg/SQLAlchemy и т.д.).
      # Пароль и имя БД должны совпадать с сервисом postgres выше.
      DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-redmine_matrix}
    volumes:
      # State JSON (см. bot.py: data_dir) — переживает обновления образа.
      - ./data:/app/data
      # Явная подстановка .env в рабочий каталог для python-dotenv (load_dotenv).
      - ./.env:/app/.env:ro
    working_dir: /app
    healthcheck:
      # Отдельный процесс импортирует bot — проверка целостности образа и зависимостей.
      test: ["CMD", "python", "-c", "import bot"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
    driver: local
