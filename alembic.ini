[alembic]
script_location = alembic
prepend_sys_path = . src
version_path_separator = os

# Приоритет: переменная окружения DATABASE_URL (см. alembic/env.py).
# Запасной URL ниже — только если DATABASE_URL пуст; подставьте свои user/pass/db.
# Для CLI: export DATABASE_URL=postgresql://user:pass@127.0.0.1:5432/dbname
sqlalchemy.url = postgresql://user:pass@127.0.0.1:5432/via

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
